name: Fetch word of the day

on:
  schedule:
    - cron: '5 0 * * *'  # iga päev kell 00:05 UTC (03:05 Eesti aeg)
  workflow_dispatch:      # käivitamine käsitsi

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync sheet and fetch new words
        env:
          EKILEX_API_KEY: ${{ secrets.EKILEX_API_KEY }}
          EKILEX_API_URL: https://ekilex.ee
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: node scripts/sync-sheet.mjs

      - name: Generate og:image PNGs
        run: node scripts/generate-og-images.mjs

      - name: Generate per-date pages, sitemap and robots.txt
        env:
          SITE_URL: https://xn--pevasna-5wa1n.ee
        run: node scripts/generate-pages.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "cache: $(date +%Y-%m-%d)"
          git push
