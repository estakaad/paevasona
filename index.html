<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Päeva sõna</title>
  <meta name="description" content="Iga päev uus eestikeelne sõna koos seletuse ja näitelausetega.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Päeva sõna">
  <meta property="og:description" content="Iga päev uus eesti keele sõna koos seletuse ja näitelausetega.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Päeva sõna">
  <meta name="twitter:description" content="Iga päev uus eesti keele sõna koos seletuse ja näitelausetega.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Lora:ital,wght@0,400;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="palette-4">
  <a href="#word-content" class="skip-link">Mine sisu juurde</a>
  <header>
    <a href="./">Päeva sõna</a>
    <span class="page-title">iga päev uus sõna</span>
  </header>

  <main>
    <div class="word-card" id="word-card">
      <div class="word-card-top">
        <time class="word-card-date" id="date-display"></time>
        <button class="share-btn" id="btn-share" hidden aria-label="Kopeeri pildina">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
      <div id="word-content" aria-live="polite" aria-atomic="true" tabindex="-1"><div class="no-data">Laadimine...</div></div>
    </div>

    <nav aria-label="Päevade navigeerimine">
      <button id="btn-prev" aria-label="Eelmine sõna">&#8592;</button>
      <button id="btn-next" aria-label="Järgmine sõna">&#8594;</button>
    </nav>
  </main>

<div class="footer-links">
    <button id="btn-random">Suvakas</button>
    <a href="archive.html">Arhiiv</a>
    <a href="info.html">Info</a>
  </div>

  <script data-goatcounter="https://paevasona.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  <script type="module">
    import { renderWordHtml, formatDate } from './render-word.mjs';
    import { generateAndShareImage } from './share-image.mjs';

    // Capture stable base URLs before any pushState changes the document URL.
    const cacheBase = new URL('./cache/', window.location.href).href;
    const datesBase = new URL('./', window.location.href).href;

    // Pin site-level links to absolute URLs now, before pushState shifts the base.
    document.querySelector('header a').href = datesBase;
    document.querySelector('a[href="archive.html"]').href = datesBase + 'archive.html';
    document.querySelector('a[href="info.html"]').href = datesBase + 'info.html';

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function formatDateNav(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('et-EE', { day: 'numeric', month: 'long' });
    }

    function getAdjacentDates(date) {
      const sorted = [...availableDates].sort();
      let prevDate = null, nextDate = null;
      for (const d of sorted) {
        if (d < date) prevDate = d;
        if (d > date && nextDate === null) nextDate = d;
      }
      return { prevDate, nextDate };
    }

    function updateNavButtons(date) {
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const { prevDate, nextDate } = getAdjacentDates(date);
      if (prevDate) {
        const label = formatDateNav(prevDate);
        btnPrev.innerHTML = `&#8592; <span class="nav-date">${label}</span>`;
        btnPrev.setAttribute('aria-label', 'Eelmine sõna: ' + label);
        btnPrev.style.visibility = 'visible';
      } else {
        btnPrev.innerHTML = '&#8592;';
        btnPrev.removeAttribute('aria-label');
        btnPrev.style.visibility = 'hidden';
      }
      if (nextDate) {
        const label = formatDateNav(nextDate);
        btnNext.innerHTML = `<span class="nav-date">${label}</span> &#8594;`;
        btnNext.setAttribute('aria-label', 'Järgmine sõna: ' + label);
        btnNext.style.visibility = 'visible';
      } else {
        btnNext.innerHTML = '&#8594;';
        btnNext.removeAttribute('aria-label');
        btnNext.style.visibility = 'hidden';
      }
    }

    let availableDates = new Set();
    let currentData = null;

    // Redirect any stale ?date= URLs to the canonical clean-path page.
    const rawDate = new URLSearchParams(window.location.search).get('date') || '';
    if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
      window.location.replace(datesBase + rawDate + '/');
    }

    let currentDate = todayStr();

    async function loadWord(date) {
      const content = document.getElementById('word-content');
      const dateEl = document.getElementById('date-display');
      dateEl.textContent = formatDate(date);
      dateEl.setAttribute('datetime', date);
      document.getElementById('btn-prev').style.visibility = 'hidden';
      document.getElementById('btn-next').style.visibility = 'hidden';
      document.getElementById('btn-share').hidden = true;
      content.innerHTML = '<div class="no-data">Laadimine...</div>';
      try {
        const res = await fetch(cacheBase + date + '.json?v=3');
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        currentData = data;
        content.innerHTML = renderWordHtml(data);
        document.title = `Päeva sõna – ${data.word}`;
        document.getElementById('btn-share').hidden = false;
        updateNavButtons(date);
      } catch {
        content.innerHTML = `<div class="empty-state">
          <p class="empty-state-msg">Etskae, polegi sõna selleks päevaks!</p>
          <button class="empty-state-btn" id="btn-random-err">Vaata suvakat sõna</button>
        </div>`;
        document.getElementById('btn-random-err').addEventListener('click', goRandom);
        updateNavButtons(date);
      }
    }

    function trackPageview(path) {
      if (window.goatcounter?.count) window.goatcounter.count({ path });
    }

    function navigate(n) {
      const { prevDate, nextDate } = getAdjacentDates(currentDate);
      const target = n < 0 ? prevDate : nextDate;
      if (!target) return;
      currentDate = target;
      history.pushState(null, '', datesBase + target + '/');
      trackPageview('/' + target + '/');
      loadWord(currentDate);
    }

    function goRandom() {
      const today = todayStr();
      const dates = [...availableDates].filter(d => d !== today);
      if (!dates.length) return;
      const date = dates[Math.floor(Math.random() * dates.length)];
      currentDate = date;
      history.pushState(null, '', datesBase + date + '/');
      trackPageview('/' + date + '/');
      loadWord(date);
    }

    const sourceTooltip = document.createElement('div');
    sourceTooltip.id = 'source-tooltip';
    sourceTooltip.className = 'source-tooltip';
    sourceTooltip.setAttribute('role', 'tooltip');
    document.body.appendChild(sourceTooltip);

    function positionTooltip(item) {
      const rect = item.getBoundingClientRect();
      const tw = sourceTooltip.offsetWidth;
      const th = sourceTooltip.offsetHeight;
      let left = rect.left + window.scrollX;
      let top = rect.bottom + window.scrollY + 6;
      if (rect.left + tw > window.innerWidth - 8) left = window.scrollX + window.innerWidth - tw - 8;
      if (rect.bottom + th + 6 > window.innerHeight) top = rect.top + window.scrollY - th - 6;
      sourceTooltip.style.left = left + 'px';
      sourceTooltip.style.top = top + 'px';
    }

    function showTooltip(item) {
      sourceTooltip.textContent = item.dataset.detail;
      sourceTooltip.style.left = '-9999px';
      sourceTooltip.style.top = '-9999px';
      sourceTooltip.classList.add('visible');
      item.setAttribute('aria-expanded', 'true');
      item.setAttribute('aria-describedby', 'source-tooltip');
      positionTooltip(item);
    }

    function hideTooltip(item) {
      sourceTooltip.classList.remove('visible');
      if (item) {
        item.setAttribute('aria-expanded', 'false');
        item.removeAttribute('aria-describedby');
      }
    }

    document.addEventListener('click', function(e) {
      const item = e.target.closest('[data-detail]');
      if (item) {
        e.stopPropagation();
        if (item.getAttribute('aria-expanded') === 'true') {
          hideTooltip(item);
        } else {
          const prev = document.querySelector('[data-detail][aria-expanded="true"]');
          if (prev) hideTooltip(prev);
          showTooltip(item);
        }
      } else {
        const active = document.querySelector('[data-detail][aria-expanded="true"]');
        if (active) hideTooltip(active);
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const active = document.querySelector('[data-detail][aria-expanded="true"]');
        if (active) { hideTooltip(active); active.focus(); }
        return;
      }
      if (e.key === 'Enter' || e.key === ' ') {
        const item = e.target.closest('[data-detail]');
        if (item) {
          e.preventDefault();
          if (item.getAttribute('aria-expanded') === 'true') {
            hideTooltip(item);
          } else {
            const prev = document.querySelector('[data-detail][aria-expanded="true"]');
            if (prev) hideTooltip(prev);
            showTooltip(item);
          }
        }
      }
    });

    document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('btn-next').addEventListener('click', () => navigate(1));
    document.getElementById('btn-random').addEventListener('click', goRandom);

    const shareBtn = document.getElementById('btn-share');
    const shareBtnLabel = shareBtn.innerHTML;
    shareBtn.addEventListener('click', async () => {
      if (!currentData || shareBtn.disabled) return;
      shareBtn.disabled = true;
      try {
        await generateAndShareImage(currentData);
        shareBtn.innerHTML = '<svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        shareBtn.setAttribute('aria-label', 'Kopeeritud!');
        setTimeout(() => { shareBtn.disabled = false; shareBtn.innerHTML = shareBtnLabel; shareBtn.setAttribute('aria-label', 'Kopeeri pildina'); }, 2000);
      } catch (e) {
        console.error('Copy failed:', e);
        shareBtn.disabled = false;
        shareBtn.innerHTML = shareBtnLabel;
      }
    });

    fetch(cacheBase + 'index.json')
      .then(r => r.json())
      .then(index => { availableDates = new Set(index.map(e => e.date)); })
      .catch(() => {})
      .finally(() => loadWord(currentDate));
  </script>
</body>
</html>
