<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Päeva sõna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Lora:ital,wght@0,400;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="palette-4">
  <header>
    <a href="index.html">Päeva sõna</a>
    <span class="page-title">iga päev uus sõna</span>
  </header>

  <main>
    <div class="word-card" id="word-card">
      <div class="word-card-top">
        <span class="word-card-date" id="date-display"></span>
      </div>
      <div id="word-content"><div class="no-data">Laadimine...</div></div>
    </div>

    <nav>
      <button id="btn-prev" onclick="navigate(-1)">&#8592;</button>
      <button id="btn-next" onclick="navigate(1)">&#8594;</button>
    </nav>
  </main>

<div class="footer-links">
    <button onclick="goRandom()">Suvakas</button>
    <a href="archive.html">Arhiiv</a>
    <a href="info.html">Info</a>
  </div>

  <script>
    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(str) {
      const d = parseDate(str);
      return d.toLocaleDateString('et-EE', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatDateShort(str) {
      const [y, m, d] = str.split('-');
      return `${d}.${m}.${y}`;
    }

    function addDays(dateStr, n) {
      const d = parseDate(dateStr);
      d.setDate(d.getDate() + n);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatDateNav(str) {
      const d = parseDate(str);
      return d.toLocaleDateString('et-EE', { day: 'numeric', month: 'long' });
    }

    function getAdjacentDates(date) {
      const sorted = [...availableDates].sort();
      let prevDate = null, nextDate = null;
      for (const d of sorted) {
        if (d < date) prevDate = d;
        if (d > date && nextDate === null) nextDate = d;
      }
      return { prevDate, nextDate };
    }

    function updateNavButtons(date) {
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const { prevDate, nextDate } = getAdjacentDates(date);
      if (prevDate) {
        const label = formatDateNav(prevDate);
        btnPrev.innerHTML = `&#8592; <span class="nav-date">${label}</span>`;
        btnPrev.setAttribute('aria-label', 'Eelmine sõna: ' + label);
        btnPrev.style.visibility = 'visible';
      } else {
        btnPrev.innerHTML = '&#8592;';
        btnPrev.removeAttribute('aria-label');
        btnPrev.style.visibility = 'hidden';
      }
      if (nextDate) {
        const label = formatDateNav(nextDate);
        btnNext.innerHTML = `<span class="nav-date">${label}</span> &#8594;`;
        btnNext.setAttribute('aria-label', 'Järgmine sõna: ' + label);
        btnNext.style.visibility = 'visible';
      } else {
        btnNext.innerHTML = '&#8594;';
        btnNext.removeAttribute('aria-label');
        btnNext.style.visibility = 'hidden';
      }
    }

    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    let availableDates = new Set();

    const params = new URLSearchParams(window.location.search);
    const rawDate = params.get('date') || '';
    let currentDate = /^\d{4}-\d{2}-\d{2}$/.test(rawDate) ? rawDate : todayStr();

    async function loadWord(date) {
      const content = document.getElementById('word-content');
      const dateDisplay = document.getElementById('date-display');
      dateDisplay.textContent = formatDate(date);

      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      btnPrev.style.visibility = 'hidden';
      btnNext.style.visibility = 'hidden';

      content.innerHTML = '<div class="no-data">Laadimine...</div>';

      try {
        const res = await fetch(`./cache/${date}.json?v=3`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderWord(data, content);
        updateNavButtons(date);
      } catch {
        content.innerHTML = `<div class="empty-state">
          <p class="empty-state-msg">Etskae, polegi sõna selleks päevaks!</p>
          <button class="empty-state-btn" onclick="goRandom()">Vaata suvakat sõna</button>
        </div>`;
        updateNavButtons(date);
      }
    }

    function renderWord(data, content) {
      const sonaveebiUrl = `https://sonaveeb.ee/search/unif/est/eki/${encodeURIComponent(data.word)}/1/est`;

      let html = `<div class="word-title"><a href="${sonaveebiUrl}" target="_blank" rel="noopener">${escapeHtml(data.word)}</a></div>`;

      const f = data.forms || {};
      const nounForms = ['SgN', 'SgG', 'SgP'].map(c => f[c]).filter(Boolean);
      const verbForms = ['Sup', 'Inf', 'IndPrSg3'].map(c => f[c]).filter(Boolean);
      const displayForms = nounForms.length >= 2 ? nounForms : verbForms.length >= 2 ? verbForms : [];
      if (displayForms.length) {
        html += `<div class="word-forms">${displayForms.map(escapeHtml).join(', ')}</div>`;
      }

      const lexemes = data.lexemes || [];
      if (!lexemes.length) {
        html += '<div class="no-data">Definitsioone ei leitud.</div>';
      } else {
        // Group consecutive lexemes by part of speech
        const posGroups = [];
        for (const lex of lexemes) {
          const posKey = (lex.pos || []).join('\x00');
          const last = posGroups[posGroups.length - 1];
          if (last && last.posKey === posKey) {
            last.lexemes.push(lex);
          } else {
            posGroups.push({ posKey, pos: lex.pos || [], lexemes: [lex] });
          }
        }

        for (const group of posGroups) {
          html += '<div class="pos-group">';
          if (group.pos.length) {
            html += `<div class="pos">${escapeHtml(group.pos.join(', '))}</div>`;
          }
          for (const lex of group.lexemes) {
            html += '<div class="lexeme">';
            if (lex.definitions && lex.definitions.length) {
              html += '<ol class="definitions">';
              for (const rawDef of lex.definitions) {
                const def = rawDef.replace(/<eki-foreign>/g, '<em>').replace(/<\/eki-foreign>/g, '</em>');
                html += `<li><span>${def}</span></li>`;
              }
              html += '</ol>';
            }
            if (lex.usages && lex.usages.length) {
              html += '<div class="word-examples">';
              for (const u of lex.usages) {
                const text = typeof u === 'string' ? u : u.text;
                let sourcesHtml = '';
                if (typeof u === 'object' && u.sources && u.sources.length) {
                  const parts = u.sources.map(s => {
                    if (typeof s === 'string') return escapeHtml(s);
                    const label = escapeHtml(s.label || '');
                    const detail = s.detail ? ` data-detail="${escapeHtml(s.detail)}"` : '';
                    return `<span class="usage-source-item"${detail}>${label}</span>`;
                  });
                  sourcesHtml = `<span class="usage-source">${parts.join('; ')}</span>`;
                }
                html += `<div class="usage">${text}${sourcesHtml}</div>`;
              }
              html += '</div>';
            }
            html += '</div>';
          }
          html += '</div>';
        }
      }

      const year = data.date.slice(0, 4);
      const citationUrl = sonaveebiUrl;
      html += `<div class="word-source">Allikas: ${escapeHtml(data.word)}. EKI ühendsõnastik ${year}. Eesti Keele Instituut, Sõnaveeb ${year}. <a href="${citationUrl}" target="_blank" rel="noopener">${citationUrl}</a> (${formatDateShort(data.date)})</div>`;

      content.innerHTML = html;
      document.title = `Päeva sõna – ${data.word}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function navigate(n) {
      const { prevDate, nextDate } = getAdjacentDates(currentDate);
      const target = n < 0 ? prevDate : nextDate;
      if (!target) return;
      currentDate = target;
      history.pushState(null, '', '?date=' + target);
      loadWord(currentDate);
    }

    function goRandom() {
      const today = todayStr();
      const dates = [...availableDates].filter(d => d !== today);
      if (!dates.length) return;
      const date = dates[Math.floor(Math.random() * dates.length)];
      currentDate = date;
      history.pushState(null, '', '?date=' + date);
      loadWord(date);
    }

const sourceTooltip = document.createElement('div');
    sourceTooltip.className = 'source-tooltip';
    document.body.appendChild(sourceTooltip);

    document.addEventListener('click', function(e) {
      const item = e.target.closest('[data-detail]');
      if (item) {
        e.stopPropagation();
        const detail = item.dataset.detail;
        if (sourceTooltip.dataset.for === detail && sourceTooltip.classList.contains('visible')) {
          sourceTooltip.classList.remove('visible');
          return;
        }
        sourceTooltip.textContent = detail;
        sourceTooltip.dataset.for = detail;
        sourceTooltip.style.left = '-9999px';
        sourceTooltip.style.top = '-9999px';
        sourceTooltip.classList.add('visible');
        const rect = item.getBoundingClientRect();
        const tw = sourceTooltip.offsetWidth;
        const th = sourceTooltip.offsetHeight;
        let left = rect.left + window.scrollX;
        let top = rect.bottom + window.scrollY + 6;
        if (rect.left + tw > window.innerWidth - 8) left = window.scrollX + window.innerWidth - tw - 8;
        if (rect.bottom + th + 6 > window.innerHeight) top = rect.top + window.scrollY - th - 6;
        sourceTooltip.style.left = left + 'px';
        sourceTooltip.style.top = top + 'px';
      } else {
        sourceTooltip.classList.remove('visible');
      }
    });

    fetch('./cache/index.json')
      .then(r => r.json())
      .then(index => { availableDates = new Set(index.map(e => e.date)); })
      .catch(() => {})
      .finally(() => loadWord(currentDate));
  </script>
</body>
</html>
