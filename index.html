<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Päeva sõna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300..800;1,9..144,300..800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="index.html">Päeva sõna</a>
  </header>

  <main>
    <div class="word-card" id="word-card">
      <div class="word-card-top">
        <span class="word-card-date" id="date-display"></span>
        <button class="word-card-share" id="share-icon-btn" onclick="openShare()" title="Jaga">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>
      </div>
      <div id="word-content"><div class="no-data">Laadimine...</div></div>
    </div>

    <nav>
      <button id="btn-prev" onclick="navigate(-1)">&#8592;</button>
      <button id="btn-next" onclick="navigate(1)">&#8594;</button>
    </nav>
  </main>

  <div class="share-overlay" id="share-overlay" onclick="closeShare(event)">
    <div>
      <div class="share-card" id="share-card">
        <button class="share-close" onclick="closeShareBtn()">&#x2715;</button>
        <div class="share-accent"></div>
        <div class="share-word" id="share-word"></div>
        <div class="share-date" id="share-date-text"></div>
        <div class="share-site">paevasona</div>
      </div>
      <div class="share-hint">Tee screenshot või kasuta allpool jagamisnuppu</div>
    </div>
  </div>

  <div class="footer-links">
    <a href="archive.html">Arhiiv</a>
    <a href="info.html">Info</a>
  </div>

  <script>
    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(str) {
      const d = parseDate(str);
      return d.toLocaleDateString('et-EE', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatDateShort(str) {
      const [y, m, d] = str.split('-');
      return `${d}.${m}.${y}`;
    }

    function addDays(dateStr, n) {
      const d = parseDate(dateStr);
      d.setDate(d.getDate() + n);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    let availableDates = new Set();

    const params = new URLSearchParams(window.location.search);
    let currentDate = params.get('date') || todayStr();

    async function loadWord(date) {
      const content = document.getElementById('word-content');
      const dateDisplay = document.getElementById('date-display');
      dateDisplay.textContent = formatDate(date);

      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      btnPrev.style.visibility = 'hidden';
      btnNext.style.visibility = 'hidden';

      content.innerHTML = '<div class="no-data">Laadimine...</div>';
      document.getElementById('share-icon-btn').style.visibility = 'hidden';

      try {
        const res = await fetch(`./cache/${date}.json?v=2`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderWord(data, content);
        const prevDate = addDays(date, -1);
        const nextDate = addDays(date, 1);
        const hasPrev = availableDates.has(prevDate);
        const hasNext = availableDates.has(nextDate);
        btnPrev.style.visibility = hasPrev ? 'visible' : 'hidden';
        btnNext.style.visibility = hasNext ? 'visible' : 'hidden';
        btnPrev.title = hasPrev ? formatDate(prevDate) : '';
        btnNext.title = hasNext ? formatDate(nextDate) : '';
      } catch {
        content.innerHTML = '<div class="no-data">Selle päeva sõna pole veel saadaval.</div>';
      }
    }

    function renderWord(data, content) {
      const sonaveebiUrl = `https://sonaveeb.ee/search/unif/est/eki/${encodeURIComponent(data.word)}/1/est`;

      let html = `<div class="word-title"><a href="${sonaveebiUrl}" target="_blank" rel="noopener">${escapeHtml(data.word)}</a></div>`;

      const lexemes = data.lexemes || [];
      if (!lexemes.length) {
        html += '<div class="no-data">Definitsioone ei leitud.</div>';
      } else {
        for (const lex of lexemes) {
          html += '<div class="lexeme">';
          if (lex.pos && lex.pos.length) {
            html += `<div class="pos">${escapeHtml(lex.pos.join(', '))}</div>`;
          }
          if (lex.definitions && lex.definitions.length) {
            html += '<ol class="definitions">';
            for (const def of lex.definitions) {
              html += `<li>${def}</li>`;
            }
            html += '</ol>';
          }
          if (lex.usages && lex.usages.length) {
            html += '<div class="word-examples">';
            for (const u of lex.usages) {
              const text = typeof u === 'string' ? u : u.text;
              const sources = typeof u === 'object' && u.sources && u.sources.length
                ? `<span class="usage-source">${u.sources.map(s => escapeHtml(s)).join('; ')}</span>`
                : '';
              html += `<div class="usage">${text}${sources}</div>`;
            }
            html += '</div>';
          }
          html += '</div>';
        }
      }

      const year = data.date.slice(0, 4);
      const citationUrl = sonaveebiUrl;
      html += `<div class="word-source">Allikas: ${escapeHtml(data.word)}. EKI ühendsõnastik ${year}. Eesti Keele Instituut, Sõnaveeb ${year}. <a href="${citationUrl}" target="_blank" rel="noopener">${citationUrl}</a> (${formatDateShort(data.date)})</div>`;

      content.innerHTML = html;
      document.title = `Päeva sõna – ${data.word}`;
      document.getElementById('share-icon-btn').style.visibility = 'visible';
      document.getElementById('share-icon-btn').style.display = 'block';
      document.getElementById('share-word').textContent = data.word;
      document.getElementById('share-date-text').textContent = formatDate(data.date);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function navigate(n) {
      const next = addDays(currentDate, n);
      if (!availableDates.has(next)) return;
      currentDate = next;
      loadWord(currentDate);
    }

    function openShare() {
      const word = document.getElementById('share-word').textContent;
      if (!word) return;
      if (navigator.share) {
        navigator.share({ title: 'Päeva sõna', text: word, url: window.location.href });
      } else {
        document.getElementById('share-overlay').classList.add('open');
      }
    }

    function closeShareBtn() {
      document.getElementById('share-overlay').classList.remove('open');
    }

    function closeShare(e) {
      if (e.target === document.getElementById('share-overlay')) {
        document.getElementById('share-overlay').classList.remove('open');
      }
    }

    fetch('./cache/index.json')
      .then(r => r.json())
      .then(index => { availableDates = new Set(index.map(e => e.date)); })
      .catch(() => {})
      .finally(() => loadWord(currentDate));
  </script>
</body>
</html>
