<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arhiiv — Päevasõna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300..800;1,9..144,300..800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <a href="index.html">Päeva sõna</a>
    <h1 class="page-title">Arhiiv</h1>
  </header>

  <main>
    <div class="word-card" id="archive-content">
      <div class="no-data">Laadimine...</div>
    </div>
  </main>

  <div class="footer-links">
    <a href="archive.html">Arhiiv</a>
    <a href="info.html">Info</a>
  </div>

  <script>
    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    async function load() {
      const container = document.getElementById('archive-content');
      try {
        const res = await fetch('./cache/index.json');
        if (!res.ok) throw new Error();
        const index = await res.json();
        if (!index.length) {
          container.innerHTML = '<div class="no-data">Arhiiv on tühi.</div>';
          return;
        }

        const groups = {};
        for (const entry of index) {
          const key = entry.date.slice(0, 7);
          if (!groups[key]) groups[key] = [];
          groups[key].push(entry);
        }

        const sortedKeys = Object.keys(groups).sort().reverse();

        container.innerHTML = sortedKeys.map((key, i) => {
          const [year, month] = key.split('-').map(Number);
          const rawMonth = new Date(year, month - 1, 1)
            .toLocaleDateString('et-EE', { month: 'long', year: 'numeric' });
          const monthName = rawMonth.charAt(0).toUpperCase() + rawMonth.slice(1);
          const items = groups[key].map(entry => {
            const day = parseInt(entry.date.slice(8, 10));
            return `<li>
              <span class="archive-date">${day}.</span>
              <a href="index.html?date=${entry.date}">${entry.word}</a>
            </li>`;
          }).join('');
          return `<div class="archive-month${i === 0 ? ' archive-month--first' : ''}">
            <div class="archive-month-header">${monthName}</div>
            <ul class="archive-list">${items}</ul>
          </div>`;
        }).join('');
      } catch {
        container.innerHTML = '<div class="no-data">Arhiivi ei õnnestunud laadida.</div>';
      }
    }

    load();
  </script>
</body>
</html>
