<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info — Päeva sõna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #C85F72;
      color: #F5EDE5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header a {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #F5EDE5;
      text-decoration: none;
    }

    header a:hover {
      color: #F5EDE5;
    }

    header h1 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #F5EDE5;
      margin-top: 0.5rem;
    }

    main {
      width: 100%;
      max-width: 640px;
    }

    section {
      margin-bottom: 2.5rem;
    }

    h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: normal;
      margin-bottom: 0.8rem;
      color: #F5EDE5;
    }

    p {
      line-height: 1.7;
      color: #F5EDE5;
    }

    p + p {
      margin-top: 0.8rem;
    }

    a {
      color: #F5EDE5;
      text-decoration: none;
      border-bottom: 1px solid rgba(245, 237, 229, 0.4);
    }

    a:hover {
      color: #E3B85A;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">&#8592; Päeva sõna</a>
    <h1>Info</h1>
  </header>

  <main>
    <section>
      <h2>Sõnad</h2>
      <p><!-- SIIA: kust sõnad pärit on --></p>
    </section>

    <section>
      <h2>Tegija</h2>
      <p><!-- SIIA: kes tegi --></p>
    </section>
  </main>
</body>
</html>
